name: Build and Publish anyapk APK

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'  # Trigger on version tags like v1.0, v2.1, etc.
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build debug APK
      run: ./gradlew assembleDebug
      
    - name: Upload debug APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: anyapk-debug
        path: app/build/outputs/apk/debug/*.apk
        
    - name: Create Release and Upload APK
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/*.apk
        name: Release ${{ github.ref_name }}
        body: |
          ## anyapk Debug Build
          
          This is an automated debug build for version ${{ github.ref_name }}.
          
          ### Installation
          1. Download the APK
          2. Enable "Install from unknown sources" if prompted
          3. Install and enjoy!
          
          ### Features
          - Debug build with full functionality
          - No root required
          - Works with wireless debugging
          
          ### Notes
          This is a debug build - it may show a warning during installation but works perfectly.
        generate_release_notes: true
